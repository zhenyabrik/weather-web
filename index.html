<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather</title>
  <!-- Leaflet (interactive map, OpenStreetMap tiles, no API key needed) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <link rel="stylesheet" href="styles.css" />
  <!-- Google AdSense loader. Replace ca-pub-XXXXXXXXXXXXXXXX with your publisher ID. -->
  <script
    async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
    crossorigin="anonymous"
  ></script>
</head>
<body>
  <div class="layout">
    <aside class="rates card" aria-label="Exchange rates">
      <h2 class="rates__title">Rates</h2>
      <ul id="rates-list" class="rates__list"></ul>
      <p id="rates-updated" class="rates__updated"></p>
    </aside>

    <main class="container">
    <header class="app-header">
      <h1>Weather</h1>
      <p class="subtitle">Pick a country and city for current conditions and a 7-day forecast.</p>
    </header>

    <div class="selector">
      <label class="selector__field">
        <span class="selector__label">Country</span>
        <select id="country-select" class="selector__input">
          <option value="" disabled selected>Select a country…</option>
        </select>
      </label>
      <label class="selector__field">
        <span class="selector__label">City</span>
        <select id="city-select" class="selector__input" disabled>
          <option value="" disabled selected>Select a city…</option>
        </select>
      </label>
    </div>

    <p id="status" class="status" role="status" aria-live="polite"></p>

    <section id="current" class="current card" hidden aria-live="polite">
      <div class="current__main">
        <span id="current-icon" class="current__icon" aria-hidden="true"></span>
        <div class="current__temp">
          <span id="current-temp" class="current__temp-value"></span>
          <span id="current-place" class="current__place"></span>
          <span id="current-desc" class="current__desc"></span>
        </div>
      </div>
      <ul class="current__details">
        <li><span class="detail-label">Wind</span><span id="current-wind" class="detail-value"></span></li>
        <li><span class="detail-label">Humidity</span><span id="current-humidity" class="detail-value"></span></li>
      </ul>
    </section>

    <section id="map-section" class="map-section" hidden aria-label="City location map">
      <h2 class="map-section__title">Location</h2>
      <div id="map" class="map"></div>
    </section>

    <section id="forecast-section" class="forecast" hidden aria-label="7-day forecast">
      <h2 class="forecast__title">7-Day Forecast</h2>
      <div id="forecast" class="forecast__grid"></div>
    </section>

    <!-- Advertisement.
         Replace ca-pub-XXXXXXXXXXXXXXXX with your AdSense publisher ID
         and data-ad-slot with your ad unit's slot ID. -->
    <aside class="ad" aria-label="Advertisement">
      <span class="ad__label">Advertisement</span>
      <ins
        class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
        data-ad-slot="0000000000"
        data-ad-format="auto"
        data-full-width-responsive="true"
      ></ins>
    </aside>
    </main>
  </div>

  <script src="locations.js" defer></script>
  <script src="script.js" defer></script>
  <!-- Request the ad once the page has loaded. -->
  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</body>
</html>
